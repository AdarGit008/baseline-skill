name: ci
on: [push, pull_request]
permissions: read-all
jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # the golden fixtures and self-score exercise git history
      - name: secret-scan gate (gitleaks — SEC-12; server-side complement to the pre-push scrub hook; .gitleaks.toml allowlists the test/ fake-secret corpus)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      - name: rule-set integrity (--self-check)
        run: node check.mjs --self-check
      - name: golden corpus (structured-verdict pins)
        run: node test/golden/run.mjs --verify
      - name: orient availability (offline / no-forge degradation)
        run: node test/orient/run.mjs
      - name: facts/join/derive (deterministic over forge replay)
        run: node test/facts/run.mjs
      - name: records — loader split, schemas, scrub, log write-gate
        run: node test/records/run.mjs
      - name: lane claim/reclaim — atomic ref creation, race, leases (local bare origin)
        run: node test/lane/run.mjs
      - name: FLOW/DIV rules — lane-world verdicts across the branch-state matrix
        run: node test/flow/run.mjs
      - name: admit — staleness contract, FS1/FS5, DESC-03, MERGE-02, JDG-only path (local bare origin)
        run: node test/admit/run.mjs
      - name: reconcile — lifecycle, mutation channel, merged-while-red, binding law (local bare origin + replay)
        run: node test/reconcile/run.mjs
      - name: gen — generated-view contract + inputs_digest stability (no gen --check step — this repo has zero views; green-by-construction is theater)
        run: node test/gen/run.mjs
      - name: self-score (the standard checks itself)
        run: node check.mjs --repo . --no-exec
